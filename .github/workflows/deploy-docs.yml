name: Deploy docs

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, closed]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "subdir=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "base=/release-playground/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "subdir=" >> "$GITHUB_OUTPUT"
            echo "base=/release-playground/" >> "$GITHUB_OUTPUT"
          else
            echo "subdir=beta" >> "$GITHUB_OUTPUT"
            echo "base=/release-playground/beta/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs
        run: |
          # Override base path for this deploy target
          sed -i "s|base: \"/release-playground/\"|base: \"${{ steps.target.outputs.base }}\"|" rspress.config.ts
          npx rspress build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc_build
          destination_dir: ${{ steps.target.outputs.subdir }}
          keep_files: true

      - name: Comment PR with docs link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            📖 Docs preview: https://jpwesselink.github.io/release-playground/pr-${{ github.event.pull_request.number }}/

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR docs
        run: |
          rm -rf pr-${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs: remove pr-${{ github.event.pull_request.number }} preview"
          git push
